services:
  - type: web
    name: regwatch
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_MODE
        value: mistral
      - key: MISTRAL_API_KEY
        sync: false   # a renseigner dans le dashboard Render
      - key: MISTRAL_MODEL
        value: mistral-small-latest
