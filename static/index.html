<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Conformité RGPD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; opacity: 0.6; }

    #model-badge {
      margin-left: auto;
      background: #2d2d4e;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      opacity: 0.9;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .msg {
      max-width: 780px;
      width: 100%;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 0.85rem 1.1rem;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }
    .source-tag {
      font-size: 0.72rem;
      background: #eef2ff;
      color: #4338ca;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
    }

    .thinking {
      font-size: 0.8rem;
      color: #94a3b8;
      font-style: italic;
      margin-bottom: 0.4rem;
    }

    #input-area {
      padding: 1rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    #question {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      transition: border-color .2s;
    }
    #question:focus { border-color: #4338ca; }

    #send {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.3rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }
    #send:disabled { opacity: 0.45; cursor: not-allowed; }

    .cursor { display: inline-block; width: 2px; height: 1em; background: #4338ca; margin-left: 2px; animation: blink .7s step-end infinite; vertical-align: text-bottom; }
    @keyframes blink { 50% { opacity: 0; } }

    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #94a3b8;
      text-align: center;
    }
    #empty strong { color: #475569; font-size: 1.1rem; }

    /* markdown-lite : gras */
    .bubble b, .bubble strong { font-weight: 700; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  <h1>Assistant Conformité RGPD</h1>
  <span>Basé sur le texte officiel UE 2016/679</span>
  <span id="model-badge">chargement…</span>
</header>

<div id="chat">
  <div id="empty">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <strong>Posez une question sur le RGPD</strong>
    <span>Ex : Quelles sont les bases légales du traitement ? Qu'est-ce qu'une violation de données ?</span>
  </div>
</div>

<div id="input-area">
  <textarea id="question" rows="1" placeholder="Votre question sur le RGPD…"></textarea>
  <button id="send">Envoyer</button>
</div>

<script>
  const chat = document.getElementById('chat')
  const empty = document.getElementById('empty')
  const questionEl = document.getElementById('question')
  const sendBtn = document.getElementById('send')
  const modelBadge = document.getElementById('model-badge')

  let currentModel = null

  // Charge le nom du modele
  fetch('/api/models').then(r => r.json()).then(data => {
    if (data.models && data.models.length) {
      currentModel = data.models[0]
      modelBadge.textContent = currentModel
    } else {
      modelBadge.textContent = 'LM Studio'
    }
  }).catch(() => { modelBadge.textContent = 'LM Studio' })

  // Auto-resize textarea
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto'
    questionEl.style.height = Math.min(questionEl.scrollHeight, 140) + 'px'
  })

  // Envoi avec Entrée (Shift+Entrée pour saut de ligne)
  questionEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit() }
  })
  sendBtn.addEventListener('click', submit)

  function addMsg(role, text = '') {
    empty.style.display = 'none'
    const wrap = document.createElement('div')
    wrap.className = `msg ${role}`
    const bubble = document.createElement('div')
    bubble.className = 'bubble'
    bubble.textContent = text
    wrap.appendChild(bubble)
    chat.appendChild(wrap)
    chat.scrollTop = chat.scrollHeight
    return { wrap, bubble }
  }

  function renderMarkdownLite(text) {
    // Gras **texte**
    return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
               .replace(/^(\d+\.\s)/gm, '<br>$1')
  }

  async function submit() {
    const question = questionEl.value.trim()
    if (!question || sendBtn.disabled) return

    sendBtn.disabled = true
    questionEl.value = ''
    questionEl.style.height = 'auto'

    addMsg('user', question)

    const { wrap, bubble } = addMsg('assistant')
    const thinking = document.createElement('div')
    thinking.className = 'thinking'
    thinking.textContent = 'Recherche des articles pertinents…'
    wrap.insertBefore(thinking, bubble)

    const cursor = document.createElement('span')
    cursor.className = 'cursor'
    bubble.appendChild(cursor)

    let fullText = ''

    try {
      const resp = await fetch('/api/ask/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, model: currentModel }),
      })

      const reader = resp.body.getReader()
      const decoder = new TextDecoder()
      let buffer = ''

      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        buffer += decoder.decode(value, { stream: true })

        const lines = buffer.split('\n')
        buffer = lines.pop()

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue
          const data = JSON.parse(line.slice(6))

          if (data.type === 'sources') {
            thinking.textContent = ''
            const tags = document.createElement('div')
            tags.className = 'sources'
            data.sources.forEach(s => {
              const tag = document.createElement('span')
              tag.className = 'source-tag'
              const label = s.type === 'article' ? `Art. ${s.number}` : `Cons. ${s.number}`
              tag.textContent = `${label} · ${s.score}`
              tags.appendChild(tag)
            })
            thinking.appendChild(tags)
          }

          if (data.type === 'thinking') {
            if (!thinking.querySelector('.thinking-label')) {
              const label = document.createElement('span')
              label.className = 'thinking-label'
              label.textContent = ' · réflexion en cours…'
              thinking.appendChild(label)
            }
          }

          if (data.type === 'token') {
            // La reponse arrive : on retire l'indicateur de reflexion
            const label = thinking.querySelector('.thinking-label')
            if (label) label.remove()
            fullText += data.token
            bubble.innerHTML = renderMarkdownLite(fullText)
            bubble.appendChild(cursor)
            chat.scrollTop = chat.scrollHeight
          }

          if (data.type === 'done') {
            cursor.remove()
            bubble.innerHTML = renderMarkdownLite(fullText)
            if (!fullText) {
              bubble.innerHTML = '<em style="color:#94a3b8">Aucune réponse générée. Essayez un autre modèle.</em>'
            }
          }
        }
      }
    } catch (err) {
      bubble.textContent = 'Erreur : ' + err.message
      cursor.remove()
    }

    sendBtn.disabled = false
    questionEl.focus()
  }
</script>
</body>
</html>
